---
- name: Initialize Kubernetes Master
  become: yes
  become_user: root
  shell: |
    kubeadm init --apiserver-advertise-address=192.168.56.11 --pod-network-cidr=10.244.0.0/16
  args:
    creates: /etc/kubernetes/admin.conf

- name: Ensure kubeconfig is set up for vagrant user
  become: yes
  args:
    creates: /home/vagrant/.kube/config
  shell: |
    mkdir -p /home/vagrant/.kube
    cp -i /etc/kubernetes/admin.conf /home/vagrant/.kube/config
    chown vagrant:vagrant /home/vagrant/.kube/config

- name: Display kubectl client version
  become: yes
  become_user: vagrant
  command: kubectl version --client
  register: kubectl_version
  changed_when: false

- debug:
    msg: "{{ kubectl_version.stdout }}"

# ✅ Wait until kube-apiserver is ready before applying Flannel
- name: Wait for kube-apiserver to be ready
  become: yes
  become_user: vagrant
  shell: kubectl get nodes
  register: kube_ready
  retries: 20
  delay: 15
  until: kube_ready.rc == 0

# ✅ Check if Flannel is already installed (idempotent)
- name: Check if Flannel is already applied
  become: yes
  become_user: vagrant
  shell: kubectl get daemonset -n kube-flannel
  register: flannel_check
  ignore_errors: true

# ✅ Apply Flannel only if not already installed
- name: Apply Flannel CNI
  become: yes
  become_user: vagrant
  shell: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml --validate=false
  when: flannel_check.rc != 0

- name: Get join command
  become: yes
  shell: kubeadm token create --print-join-command
  register: join_cmd
  run_once: true

- name: Share join command globally
  add_host:
    name: "kube_master"
    join_cmd: "{{ join_cmd.stdout }}"
